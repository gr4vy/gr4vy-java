name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}
  schedule:
    # “At 08:30 on every day-of-week from Monday through Friday.”
    - cron: 30 8 * * 1-5

# A new push to a PR cancels the previous in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Compile every source + test on each Java version. No key needed, so this
  # also protects fork PRs and catches generation drift before the live suite.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        java: [11, 17, 21]
    steps:
      - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2
      - name: Use Java ${{ matrix.java }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: corretto
          java-version: ${{ matrix.java }}
      - name: Compile main + test sources
        run: ./gradlew compileJava compileTestJava --console=plain

  # Dependency-light unit tests (JWT auth + webhook signatures) across the full
  # Java matrix. These never touch the network, so they run without a key.
  offline:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        java: [11, 17, 21]
    steps:
      - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2
      - name: Use Java ${{ matrix.java }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: corretto
          java-version: ${{ matrix.java }}
      - name: Run offline unit tests
        run: ./gradlew test --tests "com.gr4vy.sdk.AuthTest" --tests "com.gr4vy.sdk.WebhooksTest" --console=plain

  # The live E2E suite, sharded by package so each shard is a separate JVM
  # (= one isolated merchant per shard). GR4VY_TRACK_HTTP records every request
  # for the coverage report. Fork PRs have no secret, so the harness skips.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only needs to read the repo and upload artifacts; no write scope.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [flows, processing, backoffice]
    steps:
      - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2
      - name: Use Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: corretto
          java-version: 21
      - name: Require signing key on trusted refs
        # On pushes/schedules the harness would silently skip without a key,
        # masking a misconfigured secret. Fork PRs legitimately have no key.
        if: github.event_name != 'pull_request'
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          if [ -z "$PRIVATE_KEY" ]; then
            echo "PRIVATE_KEY secret is missing on a non-PR run; the live suite would silently skip." >&2
            exit 1
          fi
      - name: Run ${{ matrix.shard }} shard
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          E2E: "true"
          GR4VY_TRACK_HTTP: "1"
          GR4VY_COVERAGE_DIR: ${{ github.workspace }}/coverage/http
        run: ./gradlew test --tests "com.gr4vy.sdk.${{ matrix.shard }}.*" --console=plain
      - name: Upload reached-endpoint records
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: coverage-${{ matrix.shard }}
          path: coverage/http/*.jsonl
          if-no-files-found: ignore
          retention-days: 3

  # Endpoint-reach coverage report. Combines every shard's recorded calls and
  # posts a sticky PR comment. This is a report, not a gate.
  coverage:
    needs: e2e
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2
      - name: Use Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: corretto
          java-version: 21
      - name: Download all shard records
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          path: coverage/download
          pattern: coverage-*
          merge-multiple: true
      - name: Build coverage report
        run: |
          mkdir -p coverage/http
          # Flatten any downloaded jsonl into the dir the script reads.
          find coverage/download -name '*.jsonl' -exec cp {} coverage/http/ \; 2>/dev/null || true
          java scripts/endpoint_coverage/EndpointCoverage.java .
      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@52423e01640425a022ef5fd42c6fb5f633a02728 # v2
        with:
          header: endpoint-coverage
          path: coverage/endpoint-coverage.md

  # Stable gate: branch protection / automerge depends on THIS single check, not
  # on the sharded matrix names (which change as shards are added/removed).
  ci-complete:
    needs: [build, offline, e2e]
    if: always()
    runs-on: ubuntu-latest
    # Only needs to approve the bot's PR; no contents write.
    permissions:
      pull-requests: write
    steps:
      - name: Verify required jobs succeeded
        run: |
          if [ "${{ needs.build.result }}" != "success" ] \
            || [ "${{ needs.offline.result }}" != "success" ] \
            || [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs succeeded."
      - uses: hmarr/auto-approve-action@8f929096a962e83ccdfa8afcf855f39f12d4dac7 # v4
        if: "github.event.pull_request.user.login == 'github-actions[bot]'"
        with:
          github-token: ${{ secrets.DISPATCH_ACCESS_TOKEN }}

  merge:
    needs: ci-complete
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - id: automerge
        name: automerge
        if: "github.event.pull_request.user.login == 'github-actions[bot]'"
        uses: "pascalgn/automerge-action@7961b8b5eec56cc088c140b56d864285eabd3f67" # v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.DISPATCH_ACCESS_TOKEN }}
          MERGE_LABELS: ''
          MERGE_REQUIRED_APPROVALS: 0
          MERGE_METHOD: squash
          MERGE_COMMIT_MESSAGE: "pull-request-title"
          MERGE_ERROR_FAIL: true
          MERGE_DELETE_BRANCH: true
          MERGE_FORKS: false
          UPDATE_METHOD: rebase

  notify:
    needs: ci-complete
    runs-on: ubuntu-latest
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2
        if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'github-actions[bot]')
        env:
            SLACK_USERNAME: Java SDK
            SLACK_TITLE: Java SDK
            SLACK_WEBHOOK: ${{ secrets.SLACK_SDK_WEBHOOK_URL }}
            SLACK_CHANNEL: sdk-updates
            SLACK_MSG_AUTHOR: gr4vy-code
            SLACK_ICON_EMOJI: ":gr4vy:"
            SLACK_COLOR: "failure"
            SLACK_MESSAGE_ON_FAILURE: "CI failed"
            SLACK_FOOTER: ""
